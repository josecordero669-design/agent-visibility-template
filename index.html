<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferretería El Emprendedor | Catálogo</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --primary: #dc3545; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .product-card { border-radius: 15px; overflow: hidden; background: white; transition: 0.3s; }
        .product-card img { height: 160px; object-fit: cover; width: 100%; }
        .btn-add { background: var(--primary); color: white; border-radius: 50px; font-weight: bold; }
        #cart-count { background: #198754; color: white; padding: 2px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<!-- Header -->
<nav class="navbar navbar-dark bg-danger shadow-sm mb-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-tools"></i> El Emprendedor</a>
        <div class="text-white small" id="tasa-ui">Tasa BCV: Cargando...</div>
    </div>
</nav>

<!-- Buscador -->
<div class="container mb-4">
    <input type="text" id="buscador" class="form-control form-control-lg shadow-sm" placeholder="🔍 Buscar productos...">
</div>

<!-- Catálogo -->
<div class="container mb-5">
    <div id="grid-productos" class="row g-3">
        <div class="text-center mt-5"><h5>Cargando catálogo...</h5></div>
    </div>
</div>

<!-- Botón Flotante -->
<button onclick="finalizarCompra()" class="btn btn-success btn-lg position-fixed bottom-0 end-0 m-4 shadow-lg border-0" id="btn-cart">
    <i class="bi bi-cart3"></i> Pedir <span id="cart-count">0</span>
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
    let productos = [];
    let carrito = [];
    // Tu enlace de Google Sheets publicado
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsZPWTuA3U-UyuoLPEUZKhwv2Cp1qheFgo71lqHsTBNlkEtLEVxQu8BSP86R_QWt5xp-amKXgs8vKU/pub?output=csv";

    Papa.parse(url, { download: true, header: true, complete: res => {
        productos = res.data.filter(p => p.nombre && p.nombre !== "Tasa BCV");
        const tasaFila = res.data.find(p => p.nombre === "Tasa BCV");
        window.tasa = tasaFila ? parseFloat(tasaFila.precio) : 0;
        document.getElementById('tasa-ui').innerText = `Tasa BCV: Bs ${window.tasa}`;
        renderizar(productos);
    }});

    function renderizar(lista) {
        const grid = document.getElementById('grid-productos');
        grid.innerHTML = lista.map(p => `
            <div class="col-6 col-md-3">
                <div class="product-card h-100 shadow-sm p-2">
                    <img src="${p.imagenURL}" class="rounded">
                    <div class="p-2 text-center">
                        <h6 class="mb-0 text-truncate">${p.nombre}</h6>
                        <small class="text-muted d-block">$${p.precio} | Bs ${(p.precio * window.tasa).toFixed(2)}</small>
                        <button onclick="agregar('${p.nombre}', ${p.precio})" class="btn btn-sm btn-add w-100 mt-2">Agregar</button>
                    </div>
                </div>
            </div>`).join('');
    }

    document.getElementById('buscador').addEventListener('input', (e) => {
        const filtrados = productos.filter(p => p.nombre.toLowerCase().includes(e.target.value.toLowerCase()));
        renderizar(filtrados);
    });

    function agregar(nombre, precio) {
        carrito.push({nombre, precio});
        document.getElementById('cart-count').innerText = carrito.length;
    }

    function finalizarCompra() {
        if(carrito.length === 0) return alert("El carrito está vacío");
        let msg = "¡Hola! Quisiera realizar este pedido de Ferretería El Emprendedor: %0A%0A";
        let total = 0;
        carrito.forEach(i => { msg += `• ${i.nombre} ($${i.precio})%0A`; total += parseFloat(i.precio); });
        msg += `%0A*Total USD:* $${total.toFixed(2)}%0A*Total Bs:* Bs ${(total * window.tasa).toFixed(2)}%0A%0A¡Espero su respuesta!`;
        window.open(`https://wa.me/584145720124?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
